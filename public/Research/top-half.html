<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khanna Capital — Dubai Real Estate Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;
  --gold2:#E8C97A;
  --dark:#0A0A0F;
  --dark2:#111118;
  --dark3:#1A1A25;
  --dark4:#22222F;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.07);
  --border:rgba(201,168,76,0.2);
  --border2:rgba(255,255,255,0.08);
  --text:#F5F0E8;
  --text2:#A09880;
  --text3:#6B6352;
  --green:#2ECC71;
  --red:#E74C3C;
  --blue:#4A9EFF;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif}

/* HERO */
.hero{position:relative;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(74,158,255,0.05) 0%,transparent 50%),var(--dark)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 0%,transparent 70%)}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.1);border:1px solid var(--border);border-radius:100px;padding:8px 20px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:32px}
.hero-badge span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.hero h1{font-size:clamp(48px,7vw,96px);font-weight:300;line-height:1;letter-spacing:-2px;margin-bottom:8px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:16px;color:var(--text2);margin:24px 0 48px;max-width:500px;line-height:1.7;font-weight:300}
.hero-stats{display:flex;gap:48px;margin-bottom:64px}
.hero-stat{text-align:center}
.hero-stat .n{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--gold)}
.hero-stat .l{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:4px}
.scroll-cta{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text3);font-size:12px;letter-spacing:2px;text-transform:uppercase;animation:bounce 2s infinite}
.scroll-arrow{width:1px;height:40px;background:linear-gradient(var(--gold),transparent);margin:0 auto}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* BUDGET BAR */
.budget-bar{background:var(--dark2);border-bottom:1px solid var(--border2);padding:16px 40px;display:flex;align-items:center;gap:24px;position:sticky;top:0;z-index:100}
.budget-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.budget-total{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold)}
.budget-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden}
.budget-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:100px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.budget-remaining{font-size:13px;color:var(--text2)}
.budget-remaining strong{color:var(--text);font-weight:500}
.bundle-btn{background:var(--gold);color:var(--dark);border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.bundle-btn:hover{background:var(--gold2)}
.bundle-badge{background:var(--dark);color:var(--gold);border-radius:100px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* SECTIONS */
.section{padding:80px 40px;max-width:1400px;margin:0 auto}
.section-header{margin-bottom:56px}
.section-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.section-tag::after{content:'';flex:1;height:1px;background:var(--border);max-width:60px}
.section-title{font-size:clamp(32px,4vw,52px);font-weight:300;letter-spacing:-1px;line-height:1.1}
.section-title strong{font-weight:600;font-style:italic}

/* PHASE SELECTOR */
.phase-selector{display:flex;gap:12px;margin-bottom:48px;flex-wrap:wrap}
.phase-btn{padding:10px 24px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.phase-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:500}
.phase-btn:hover:not(.active){border-color:var(--border);color:var(--text)}

/* PROPERTY GRID */
.property-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:24px}

/* PROPERTY CARD */
.prop-card{background:var(--dark3);border:1px solid var(--border2);border-radius:16px;overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;position:relative}
.prop-card:hover{border-color:var(--border);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.prop-card.selected{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,168,76,0.3),0 20px 60px rgba(201,168,76,0.1)}
.prop-card.distress .distress-tag{display:flex}
.distress-tag{display:none;position:absolute;top:16px;left:16px;background:rgba(231,76,60,0.9);color:white;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:4px;gap:6px;align-items:center;z-index:2}
.prop-visual{height:200px;position:relative;overflow:hidden}
.prop-img{width:100%;height:100%;object-fit:cover}
.prop-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative}
.prop-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(10,10,15,0.9));padding:24px 20px 16px}
.prop-location{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:6px}
.prop-location::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--gold)}
.prop-body{padding:20px}
.prop-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:4px}
.prop-developer{font-size:12px;color:var(--text3);margin-bottom:16px}
.prop-usp-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.usp-pill{background:var(--glass);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);white-space:nowrap}
.usp-pill.hot{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);color:var(--gold)}
.prop-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--dark4);border-radius:10px;padding:12px;text-align:center}
.metric-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
.metric-val.green{color:var(--green)}
.metric-val.gold{color:var(--gold)}
.metric-val.blue{color:var(--blue)}
.metric-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.prop-price-row{display:flex;align-items:center;justify-content:space-between}
.prop-price{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600}
.prop-price span{font-size:14px;font-weight:300;color:var(--text2)}
.card-actions{display:flex;gap:8px;margin-top:16px}
.btn-primary{flex:1;background:var(--gold);color:var(--dark);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.btn-primary:hover{background:var(--gold2)}
.btn-secondary{padding:10px 14px;background:var(--glass);border:1px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.btn-secondary:hover{border-color:var(--border);color:var(--text)}
.btn-add{padding:10px 14px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;font-size:18px;transition:all 0.2s;line-height:1}
.btn-add:hover{border-color:var(--gold);color:var(--gold)}
.btn-add.added{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--glass);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:10;transition:all 0.2s}
.modal-close:hover{background:var(--glass2);color:var(--text)}
.modal-hero{height:280px;position:relative;overflow:hidden;border-radius:20px 20px 0 0}
.modal-hero-img{width:100%;height:100%;object-fit:cover}
.modal-hero-overlay{position:absolute;inset:0;background:linear-gradient(transparent 30%,var(--dark2))}
.modal-hero-content{position:absolute;bottom:28px;left:32px;right:32px}
.modal-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:500}
.modal-body{padding:32px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
.modal-section-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--border2)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-card{background:var(--dark3);border-radius:12px;padding:16px;border:1px solid var(--border2)}
.stat-card .val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;margin-bottom:4px}
.stat-card .val.green{color:var(--green)}
.stat-card .val.gold{color:var(--gold)}
.stat-card .lbl{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.chart-wrap{background:var(--dark3);border-radius:12px;padding:20px;border:1px solid var(--border2)}
.chart-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.payment-plan{margin-top:24px}
.pp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border2)}
.pp-item:last-child{border-bottom:none}
.pp-circle{width:36px;height:36px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--gold);flex-shrink:0}
.pp-label{flex:1;font-size:13px;color:var(--text2)}
.pp-pct{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text)}
.pp-amt{font-size:12px;color:var(--text3);text-align:right}
.why-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:24px}
.why-item{background:var(--dark3);border-radius:10px;padding:16px;border-left:3px solid var(--gold)}
.why-item .wi-icon{font-size:20px;margin-bottom:8px}
.why-item .wi-title{font-size:13px;font-weight:500;margin-bottom:4px}
.why-item .wi-desc{font-size:12px;color:var(--text3);line-height:1.6}
.modal-footer{padding:24px 32px;border-top:1px solid var(--border2);display:flex;gap:12px;align-items:center}
.modal-price-big{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;flex:1}
.modal-price-big span{font-size:16px;color:var(--text3);font-weight:300}

/* BUNDLE PANEL */
.bundle-panel{position:fixed;right:-480px;top:0;bottom:0;width:480px;background:var(--dark2);border-left:1px solid var(--border);z-index:200;transition:right 0.4s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden}
.bundle-panel.open{right:0}
.bundle-header{padding:28px;border-bottom:1px solid var(--border2)}
.bundle-header h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;margin-bottom:4px}
.bundle-items{flex:1;overflow-y:auto;padding:20px}
.bundle-item{background:var(--dark3);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;border:1px solid var(--border2)}
.bi-icon{width:44px;height:44px;border-radius:8px;background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.bi-content{flex:1}
.bi-name{font-size:14px;font-weight:500;margin-bottom:2px}
.bi-location{font-size:11px;color:var(--text3);margin-bottom:8px}
.bi-metrics{display:flex;gap:16px}
.bi-metric{font-size:12px;color:var(--text2)}
.bi-metric strong{color:var(--green)}
.bi-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;transition:color 0.2s}
