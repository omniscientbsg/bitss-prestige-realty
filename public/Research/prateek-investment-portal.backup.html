function renderProps(filter='all'){
  const grid=document.getElementById('propGrid');
  grid.innerHTML='';
  const filtered=PROPERTIES.filter(p=>filter==='all'||(filter==='ready'&&p.type==='ready')||(filter==='offplan'&&p.type==='offplan')||(filter==='distress'&&p.distress));
  filtered.forEach(p=>{
    const inBundle=bundle.find(b=>b.id===p.id);
    const card=document.createElement('div');
    card.className='prop-card'+(p.distress?' distress':'')+(inBundle?' selected':'');
    card.id='card-'+p.id;
    card.innerHTML=`
      ${p.distress?'<div class="distress-tag">🔥 Distress Deal</div>':''}
      <div class="prop-visual">
        ${p.image ? `<img src="${p.image}" class="prop-img">` : `<div class="prop-img-placeholder" style="background:${getBg(p.id)}">${p.emoji}</div>`}
        <div class="prop-overlay">
          <div class="prop-location">${p.locationShort}</div>
        </div>
      </div>
      <div class="prop-body">
        ${p.type==='offplan'?'<div class="phase-label">🏗️ Off-Plan Pre-Launch</div>':p.distress?'':'<div class="phase-label" style="background:rgba(46,204,113,0.1);border-color:rgba(46,204,113,0.3);color:var(--green)">✅ Ready to Rent</div>'}
        <div class="prop-name">${p.name}</div>
        <div class="prop-developer">${p.developer} · ${p.location}</div>
        <div class="prop-usp-row">
          ${p.hotUsps.map(u=>`<span class="usp-pill hot">${u}</span>`).join('')}
          ${p.usps.slice(0,2).map(u=>`<span class="usp-pill">${u}</span>`).join('')}
        </div>
        <div class="prop-metrics">
          <div class="metric"><div class="metric-val green">${p.grossYield}%</div><div class="metric-label">Gross Yield</div></div>
          <div class="metric"><div class="metric-val gold">+${p.capitalGain5yr}%</div><div class="metric-label">5yr Cap Gain</div></div>
          <div class="metric"><div class="metric-val blue">${p.downPayment}%</div><div class="metric-label">${p.type==='offplan'?'Down Pay':'Entry'}</div></div>
        </div>
        <div class="prop-price-row">
          <div class="prop-price">${formatAED(p.priceAED)}</div>
          <div class="notax">0% Tax</div>
        </div>
        <div class="card-actions">
          <button class="btn-primary" style="flex:1" onclick="openModal(${p.id}); event.stopPropagation();">View Details</button>
          <button class="btn-secondary ${inBundle?'added':''}" id="add-${p.id}" onclick="toggleBundle(${p.id}); event.stopPropagation();" style="flex:1; border: 1px solid var(--gold); background: ${inBundle?'rgba(201,168,76,0.15)':'transparent'}; color: ${inBundle?'var(--gold)':'var(--text2)'};">${inBundle?'✓ Added':'Add to Portfolio'}</button>
        </div>
      </div>
    `;
    card.onclick = () => openModal(p.id);
    grid.appendChild(card);
  });
}

function getBg(id){
  const bgs=['linear-gradient(135deg,#0d2137,#1a3a5c)','linear-gradient(135deg,#1a1428,#2d2444)','linear-gradient(135deg,#0d2418,#1a4028)','linear-gradient(135deg,#1a1a2e,#16213e)','linear-gradient(135deg,#2d1b00,#4a3000)','linear-gradient(135deg,#001a2d,#003a5c)','linear-gradient(135deg,#1a0d2e,#2d1a4a)','linear-gradient(135deg,#1a2d00,#2d4a00)'];
  return bgs[(id-1)%bgs.length];
}

function filterProps(f,btn){
  document.querySelectorAll('.phase-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProps(f);
}

function toggleBundle(id){
  const p=PROPERTIES.find(x=>x.id===id);
  const idx=bundle.findIndex(x=>x.id===id);
  if(idx>-1){bundle.splice(idx,1)}else{bundle.push(p)}
  updateBudgetBar();
  renderBundlePanel();
  // re-render cards to update selected state
  const card=document.getElementById('card-'+id);
  if(card){
    card.classList.toggle('selected');
    const btn=document.getElementById('add-'+id);
    if(btn){btn.textContent=bundle.find(x=>x.id===id)?'✓':'+'+'$';btn.className='btn-add'+(bundle.find(x=>x.id===id)?' added':'');}
  }
}

function updateBudgetBar(){
  const spent=bundle.reduce((s,p)=>s+p.priceAED,0);
  const pct=Math.min(100,(spent/BUDGET)*100);
  document.getElementById('budgetFill').style.width=pct+'%';
  const rem=BUDGET-spent;
  document.getElementById('budgetText').innerHTML=rem>=0?`<strong>${formatAED(rem)}</strong> remaining`:`<strong style="color:var(--red)">${formatAED(Math.abs(rem))} over budget</strong>`;
  document.getElementById('bundleCount').textContent=bundle.length;
}

function renderBundlePanel(){
  const el=document.getElementById('bundleItems');
  const empty=document.getElementById('emptyBundle');
  const analysis=document.getElementById('bundleAnalysis');
  if(bundle.length===0){
    empty.style.display='block';
    analysis.style.display='none';
    el.innerHTML='';
    el.appendChild(empty);
    return;
  }
  empty.style.display='none';
  el.innerHTML=bundle.map(p=>`
    <div class="bundle-item">
      <div class="bi-icon">${p.emoji}</div>
      <div class="bi-content">
        <div class="bi-name">${p.name}</div>
        <div class="bi-location">${p.locationShort}</div>
        <div class="bi-metrics">
          <div class="bi-metric">Yield: <strong>${p.grossYield}%</strong></div>
          <div class="bi-metric">${formatAED(p.priceAED)}</div>
        </div>
      </div>
      <button class="bi-remove" onclick="toggleBundle(${p.id})">✕</button>
    </div>
  `).join('');
  analysis.style.display='block';
  const total=bundle.reduce((s,p)=>s+p.priceAED,0);
  const weightedYield=bundle.reduce((s,p)=>s+(p.grossYield*(p.priceAED/total)),0);
  const annualRental=bundle.reduce((s,p)=>s+(p.priceAED * p.grossYield / 100),0);
  const fiveYrGain=bundle.reduce((s,p)=>s+(p.priceAED*(p.capitalGain5yr/100)),0);
  const totalReturn=annualRental*5+fiveYrGain;
  document.getElementById('baTotal').textContent=formatAED(total);
  document.getElementById('baYield').textContent=weightedYield.toFixed(1)+'%';
  document.getElementById('baRental').textContent=formatAED(Math.round(annualRental))+'/yr';
  document.getElementById('baGain').textContent='+'+formatAED(Math.round(fiveYrGain));
  document.getElementById('baTotalReturn').textContent='+'+formatAED(Math.round(totalReturn));
  renderBundleChart();
}

function renderBundleChart(){
  const ctx=document.getElementById('bundleChart').getContext('2d');
  if(bundleChart){bundleChart.destroy();}
  const colors=['#C9A84C','#4A9EFF','#2ECC71','#E8C97A','#9B59B6','#E74C3C','#1ABC9C','#F39C12'];
  bundleChart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:bundle.map(p=>p.name.split(' ').slice(0,2).join(' ')),
      datasets:[{data:bundle.map(p=>p.priceAED),backgroundColor:colors.slice(0,bundle.length),borderWidth:0,hoverOffset:4}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'70%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+formatAED(c.raw)}}},
    }
  });
}

let projChartInst=null;
function openModal(id){
  const p=PROPERTIES.find(x=>x.id===id);
  currentModal=p;
  
  if(p.image) {
    document.getElementById('modalHeroImg').innerHTML=`<img src="${p.image}" style="width:100%;height:100%;object-fit:cover;">`;
  } else {
    document.getElementById('modalHeroImg').innerHTML=`<span style="background:${getBg(p.id)};position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:120px">${p.emoji}</span>`;
  }

  document.getElementById('modalTag').textContent=p.location+' · '+p.developer;
  document.getElementById('modalTitle').textContent=p.name;
  document.getElementById('modalPrice').innerHTML=`${formatAED(p.priceAED)}`;
  document.getElementById('modalAddBtn').textContent=bundle.find(x=>x.id===id)?'✓ In Portfolio':'Add to Portfolio';
  document.getElementById('modalStats').innerHTML=`
    <div class="stat-card"><div class="val green">${p.grossYield}%</div><div class="lbl">Gross Rental Yield</div></div>
    <div class="stat-card"><div class="val gold">+${p.capitalGain5yr}%</div><div class="lbl">5-Year Capital Gain</div></div>
    <div class="stat-card"><div class="val">${formatAED(p.priceAED * p.grossYield / 100)}</div><div class="lbl">Est. Annual Rental</div></div>
    <div class="stat-card"><div class="val green">0%</div><div class="lbl">Tax on Returns</div></div>
  `;
  document.getElementById('modalPaymentPlan').innerHTML=`
    <div class="modal-section-title">Payment Plan</div>
    ${p.paymentPlan.map((pp,i)=>`
      <div class="pp-item">
        <div class="pp-circle">${i+1}</div>
        <div class="pp-label">${pp.l} <span style="color:var(--text3);font-size:11px">(${pp.phase})</span></div>
        <div style="text-align:right">
          <div class="pp-pct">${pp.p}%</div>
          <div class="pp-amt">${formatAED(Math.round(p.priceAED*(pp.p/100)))}</div>
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('modalWhyGrid').innerHTML=p.why.map(w=>`
    <div class="why-item"><div class="wi-icon">${w.icon}</div><div class="wi-title">${w.title}</div><div class="wi-desc">${w.desc}</div></div>
  `).join('');
  
  document.getElementById('modalDeepDive').innerHTML = p.deepDive || '';
  
  const actionBtns = document.getElementById('modalActionBtns');
  // Remove existing brochure btn if any
  const existingBtn = document.getElementById('modalBrochureBtn');
  if(existingBtn) existingBtn.remove();
  
  if(p.brochure) {
    const broBtn = document.createElement('a');
    broBtn.id = 'modalBrochureBtn';
    broBtn.href = p.brochure;
    broBtn.target = '_blank';
    broBtn.className = 'btn-secondary';
    broBtn.style.textDecoration = 'none';
    broBtn.style.display = 'flex';
    broBtn.style.alignItems = 'center';
    broBtn.style.padding = '14px 24px';
    broBtn.innerHTML = '📄 View HD Brochure';
    actionBtns.prepend(broBtn);
  }
  
  document.getElementById('modalOverlay').classList.add('open');

  setTimeout(()=>{
    const ctx=document.getElementById('projChart').getContext('2d');
    if(projChartInst){projChartInst.destroy();}
    const yrs=['Now','Yr 1','Yr 2','Yr 3','Yr 4','Yr 5'];
    projChartInst=new Chart(ctx,{
      type:'line',
      data:{
        labels:yrs,
        datasets:[{label:'Value (AED)',data:p.projValues.map(v => v * 3.67),borderColor:'#C9A84C',backgroundColor:'rgba(201,168,76,0.1)',borderWidth:2,pointBackgroundColor:'#C9A84C',pointRadius:4,fill:true,tension:0.4}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>formatAED(c.raw)}}},
        scales:{
          x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6B6352',font:{size:11}}},
          y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6B6352',font:{size:11},callback:v=>'$'+(v/1000).toFixed(0)+'K'}}
        }
      }
    });
  },100);
}

function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');}
function modalAddToBundle(){if(currentModal)toggleBundle(currentModal.id);openBundle();}
function openBundle(){document.getElementById('bundlePanel').classList.add('open'); document.getElementById('analysisPanel').classList.add('open');}
function closeBundle(){document.getElementById('bundlePanel').classList.remove('open'); document.getElementById('analysisPanel').classList.remove('open');}

function renderCompareTable(){
  const tbody=document.getElementById('compareBody');
  tbody.innerHTML=PROPERTIES.map(p=>{
    const yieldWinner=p.grossYield>=10;
    const gainWinner=p.capitalGain5yr>=45;
    return`<tr>
      <td style="font-weight:500">${p.emoji} ${p.name.split(' ').slice(0,3).join(' ')}</td>
      <td><span class="phase-label" style="${p.distress?'background:rgba(231,76,60,0.1);border-color:rgba(231,76,60,0.3);color:var(--red)':p.type==='ready'?'background:rgba(46,204,113,0.1);border-color:rgba(46,204,113,0.3);color:var(--green)':''}">${p.distress?'🔥 Distress':p.type==='ready'?'✅ Ready':'🏗️ Off-Plan'}</span></td>
      <td style="color:var(--text2);font-size:12px">${p.locationShort}</td>
      <td style="font-family:'Cormorant Garamond',serif;font-size:18px">${formatAED(p.priceAED)}</td>
      <td>
        <div class="roi-bar-wrap">
          <div class="roi-bar" style="width:${p.grossYield*8}px"></div>
          <span class="${yieldWinner?'winner':''}">${p.grossYield}%${yieldWinner?' ★':''}</span>
        </div>
      </td>
      <td class="${gainWinner?'winner':''}">+${p.capitalGain5yr}%${gainWinner?' ★':''}</td>
      <td style="color:var(--text2);font-size:12px">${p.paymentPlan.length>1?p.paymentPlan[0].p+'% now, rest structured':'Full at transfer'}</td>
      <td>${p.type==='ready'?'<span style="color:var(--green)">Immediate</span>':'<span style="color:var(--text3)">At handover</span>'}</td>
    </tr>`;
  }).join('');
}

// INIT
renderProps('all');
renderCompareTable();
renderBundlePanel();

function openLightbox(src, isVideo) {
    const container = document.getElementById('lightboxContainer');
    if (isVideo) {
        container.innerHTML = '<video src="'+src+'" controls autoplay class="lightbox-content" onclick="event.stopPropagation()"></video>';
    } else {
        container.innerHTML = '<img src="'+src+'" class="lightbox-content" onclick="event.stopPropagation()">';
    }
    document.getElementById('lightboxOverlay').classList.add('open');
}
function closeLightbox() {
    document.getElementById('lightboxOverlay').classList.remove('open');
    document.getElementById('lightboxContainer').innerHTML = ''; // Stop video playback
}
</script>

<!-- LIGHTBOX -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
    <button class="lightbox-close">&times;</button>
    <div id="lightboxContainer"></div>
</div>
